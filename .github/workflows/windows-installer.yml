name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, for example v0.4.1 or main"
        required: true
        default: "v0.4.1"
      release_tag:
        description: "Release tag used in the installer filename"
        required: true
        default: "v0.4.1"

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Inno Setup
        shell: pwsh
        run: winget install --id JRSoftware.InnoSetup --silent --accept-package-agreements --accept-source-agreements

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Check version metadata
        run: dart run scripts/verify_version_sync.dart

      - name: Analyze
        run: flutter analyze

      - name: Build installer
        shell: pwsh
        env:
          VELA_RELEASE_VERSION: ${{ inputs.release_tag }}
        run: .\scripts\package-windows.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vela-windows-installer-${{ inputs.release_tag }}
          path: release/vela-windows-${{ inputs.release_tag }}-setup.exe
          if-no-files-found: error
