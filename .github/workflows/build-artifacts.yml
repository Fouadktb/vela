name: Build Vela Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Package macOS app
        run: scripts/package-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vela-macos
          path: release/vela-macos.zip
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Package Windows app
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vela-windows
          path: release/vela-windows.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p release-upload
          cp release-artifacts/vela-macos/vela-macos.zip "release-upload/vela-macos-${GITHUB_REF_NAME}.zip"
          cp release-artifacts/vela-windows/vela-windows.zip "release-upload/vela-windows-${GITHUB_REF_NAME}.zip"
          (cd release-upload && sha256sum * > "SHA256SUMS-${GITHUB_REF_NAME}.txt")

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Vela ${{ github.ref_name }}
          body: |
            Private Vela desktop test release.

            Downloads:
            - `vela-macos-${{ github.ref_name }}.zip`
            - `vela-windows-${{ github.ref_name }}.zip`

            Notes:
            - This is an unsigned test build for macOS and Windows.
            - IPTV provider data is stored locally on the device.
            - Playback uses the embedded Vela player.
          files: release-upload/*
