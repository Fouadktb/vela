appId: com.fouadktb.iptvplayer
productName: Vela
afterPack: scripts/after-pack-mac.cjs
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
mac:
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - dmg
    - zip
  extraResources:
    - from: vendor/mpv/darwin
      to: bin/mpv/darwin
      filter:
        - "**/*"
win:
  target:
    - nsis
  extraResources:
    - from: vendor/mpv/win32
      to: bin/mpv/win32
      filter:
        - "**/*"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
