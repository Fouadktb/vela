name: vela
description: Vela desktop IPTV player for macOS and Windows.
publish_to: "none"
version: 0.2.4+5

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  file_selector: ^1.0.3
  flutter_riverpod: ^3.3.1
  http: ^1.5.0
  intl: ^0.20.2
  lucide_icons_flutter: ^3.1.14+1
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  sqlite3_flutter_libs: ^0.6.0
  window_manager: ^0.5.1
  xml: ^6.6.1

dev_dependencies:
  build_runner: ^2.10.4
  drift_dev: ^2.33.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/placeholder/
